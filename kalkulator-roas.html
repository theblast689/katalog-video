<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kalkulator ROAS Minimum</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f5f4f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    color: #1a1a1a;
  }

  .wrapper {
    width: 100%;
    max-width: 440px;
  }

  .header {
    margin-bottom: 1.5rem;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: #111;
  }

  .header p {
    font-size: 13px;
    color: #888;
    margin-top: 4px;
  }

  .card {
    background: #fff;
    border-radius: 14px;
    border: 1px solid #e8e6e0;
    overflow: hidden;
  }

  .form-section {
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #555;
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 6px;
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap .prefix,
  .input-wrap .suffix {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 13px;
    font-weight: 500;
    color: #999;
    pointer-events: none;
  }

  .input-wrap .prefix { left: 12px; }
  .input-wrap .suffix { right: 12px; }

  .input-wrap input {
    width: 100%;
    height: 44px;
    border: 1.5px solid #e0ddd6;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 500;
    color: #111;
    background: #faf9f7;
    outline: none;
    transition: border-color .15s, background .15s;
  }

  .input-wrap input:focus {
    border-color: #111;
    background: #fff;
  }

  .input-wrap.has-prefix input { padding: 0 12px 0 32px; }
  .input-wrap.has-suffix input { padding: 0 32px 0 12px; }

  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

  .divider {
    height: 1px;
    background: #f0ede7;
    margin: 0 1.5rem;
  }

  .btn-hitung {
    margin: 1.5rem;
    width: calc(100% - 3rem);
    height: 46px;
    border: none;
    border-radius: 10px;
    background: #111;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: .01em;
    transition: background .15s, transform .1s;
  }

  .btn-hitung:hover { background: #2a2a2a; }
  .btn-hitung:active { transform: scale(0.98); }

  .result-section {
    display: none;
    padding: 0 1.5rem 1.5rem;
  }

  .result-section.show { display: block; }

  .result-label {
    font-size: 11px;
    font-weight: 700;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: 10px;
  }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .result-item {
    background: #f5f4f0;
    border-radius: 10px;
    padding: 14px;
  }

  .result-item.highlight {
    background: #111;
    grid-column: 1 / -1;
  }

  .result-item .r-label {
    font-size: 11px;
    font-weight: 600;
    color: #999;
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 4px;
  }

  .result-item.highlight .r-label { color: #888; }

  .result-item .r-value {
    font-size: 20px;
    font-weight: 700;
    color: #111;
    letter-spacing: -0.5px;
  }

  .result-item.highlight .r-value {
    font-size: 28px;
    color: #fff;
  }

  .result-item .r-note {
    font-size: 11px;
    color: #bbb;
    margin-top: 2px;
  }

  .result-item.highlight .r-note { color: #777; }

  .error-msg {
    display: none;
    margin: 0 1.5rem 1rem;
    font-size: 12px;
    color: #c0392b;
    background: #fff0ee;
    border-radius: 6px;
    padding: 8px 12px;
  }
  .error-msg.show { display: block; }
</style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <h1>Kalkulator ROAS</h1>
    <p>Hitung ROAS minimum (BEP) untuk marketplace</p>
  </div>

  <div class="card">
    <div class="form-section">

      <div class="field">
        <label>Harga Jual</label>
        <div class="input-wrap has-prefix">
          <span class="prefix">Rp</span>
          <input type="number" id="harga-jual" placeholder="0" min="0"/>
        </div>
      </div>

      <div class="field">
        <label>HPP Produk</label>
        <div class="input-wrap has-prefix">
          <span class="prefix">Rp</span>
          <input type="number" id="hpp" placeholder="0" min="0"/>
        </div>
      </div>

      <div class="field">
        <label>Biaya Admin Marketplace</label>
        <div class="input-wrap has-suffix">
          <span class="suffix">%</span>
          <input type="number" id="admin" placeholder="0" min="0" max="100" step="0.1"/>
        </div>
      </div>

      <div class="field">
        <label>Biaya Affiliate</label>
        <div class="input-wrap has-suffix">
          <span class="suffix">%</span>
          <input type="number" id="affiliate" placeholder="0" min="0" max="100" step="0.1"/>
        </div>
      </div>

    </div>

    <div class="divider"></div>

    <button class="btn-hitung" onclick="hitung()">Hitung ROAS</button>

    <div class="error-msg" id="error-msg">Mohon isi semua kolom dengan benar.</div>

    <div class="result-section" id="result-section">
      <div class="result-label">Hasil Perhitungan</div>
      <div class="result-grid">

        <div class="result-item highlight">
          <div class="r-label">ROAS Minimum (BEP)</div>
          <div class="r-value" id="r-roas">—</div>
          <div class="r-note">Setiap Rp1 iklan harus menghasilkan Rp<span id="r-roas-note">—</span></div>
        </div>

        <div class="result-item">
          <div class="r-label">Total Biaya</div>
          <div class="r-value" id="r-total">—</div>
        </div>

        <div class="result-item">
          <div class="r-label">Margin Kotor</div>
          <div class="r-value" id="r-margin">—</div>
        </div>

        <div class="result-item">
          <div class="r-label">Biaya Admin</div>
          <div class="r-value" id="r-admin">—</div>
        </div>

        <div class="result-item">
          <div class="r-label">Biaya Affiliate</div>
          <div class="r-value" id="r-affiliate">—</div>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
function fmt(n) {
  return 'Rp ' + Math.round(n).toLocaleString('id-ID');
}

function hitung() {
  const harga = parseFloat(document.getElementById('harga-jual').value);
  const hpp   = parseFloat(document.getElementById('hpp').value);
  const admin = parseFloat(document.getElementById('admin').value);
  const aff   = parseFloat(document.getElementById('affiliate').value);

  const errEl = document.getElementById('error-msg');
  const resEl = document.getElementById('result-section');

  if (isNaN(harga) || isNaN(hpp) || isNaN(admin) || isNaN(aff) || harga <= 0 || hpp <= 0) {
    errEl.classList.add('show');
    resEl.classList.remove('show');
    return;
  }
  errEl.classList.remove('show');

  const biayaAdmin = harga * (admin / 100);
  const biayaAff   = harga * (aff / 100);
  const totalBiaya = hpp + biayaAdmin + biayaAff;
  const margin     = harga - totalBiaya;
  const roas       = margin > 0 ? (harga / margin) : null;

  document.getElementById('r-total').textContent     = fmt(totalBiaya);
  document.getElementById('r-margin').textContent    = fmt(margin);
  document.getElementById('r-admin').textContent     = fmt(biayaAdmin);
  document.getElementById('r-affiliate').textContent = fmt(biayaAff);

  if (roas !== null) {
    document.getElementById('r-roas').textContent      = roas.toFixed(2) + 'x';
    document.getElementById('r-roas-note').textContent = roas.toFixed(2);
  } else {
    document.getElementById('r-roas').textContent      = '∞ / Rugi';
    document.getElementById('r-roas-note').textContent = '—';
  }

  resEl.classList.add('show');
}
</script>
</body>
</html>
