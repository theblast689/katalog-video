        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

<script>
let _ytReady = false;
const _ytQueue = [];
window.onYouTubeIframeAPIReady = () => { _ytReady = true; _ytQueue.forEach(fn => fn()); _ytQueue.length = 0; };

function _ambilDurasi(ytId) {
    return new Promise((resolve) => {
        const run = () => {
            const wrap = document.createElement('div');
            wrap.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:2px;height:2px;opacity:0;pointer-events:none;';
            document.body.appendChild(wrap);
            let done = false;
            const settle = (val) => { if (done) return; done = true; try { p.destroy(); } catch(e) {} wrap.remove(); resolve(val); };
            let p;
            try {
                p = new YT.Player(wrap, {
                    videoId: ytId, playerVars: { autoplay: 0, mute: 1 },
                    events: {
                        onReady: (e) => {
                            const dur = e.target.getDuration();
                            if (dur && isFinite(dur) && dur > 0) {
                                const h = Math.floor(dur/3600), m = Math.floor((dur%3600)/60), s = Math.floor(dur%60);
                                settle(h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` : `${m}:${String(s).padStart(2,'0')}`);
                            } else { settle(null); }
                        },
                        onError: () => settle(null)
                    }
                });
            } catch(e) { settle(null); }
            setTimeout(() => settle(null), 12000);
        };
        if (_ytReady) run(); else _ytQueue.push(run);
    });
}

window.deteksiDurasiOtomatis = async () => {
    const url = document.getElementById('linkVideo').value.trim();
    if (!url) return;
    const match = url.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/|live\/)|youtu\.be\/)([^#&?]+)/);
    if (!match) return;
    const inputDurasi = document.getElementById('inputDurasi');
    const spinner = document.getElementById('durasi-spinner');
    inputDurasi.value = ''; inputDurasi.placeholder = 'Mendeteksi...'; spinner.style.display = 'block';
    const durasi = await _ambilDurasi(match[1]);
    spinner.style.display = 'none';
    if (durasi) { inputDurasi.value = durasi; inputDurasi.placeholder = 'Durasi (15:30)'; }
    else { inputDurasi.placeholder = 'Live / tidak terdeteksi'; }
};

function getYtId(url) {
    const m = url.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/|live\/)|youtu\.be\/)([^#&?]+)/);
    return m ? m[1] : null;
}

function getPlatform(url) {
    try {
        const h = new URL(url).hostname.replace('www.', '');
        if (h.includes('youtube.com') || h.includes('youtu.be')) return 'YouTube';
        if (h.includes('tiktok.com')) return 'TikTok';
        if (h.includes('instagram.com')) return 'Instagram';
        if (h.includes('twitter.com') || h.includes('x.com')) return 'X/Twitter';
        if (h.includes('facebook.com') || h.includes('fb.watch')) return 'Facebook';
        if (h.includes('vimeo.com')) return 'Vimeo';
        if (h.includes('twitch.tv')) return 'Twitch';
        if (h.includes('vidio.com')) return 'Vidio';
        if (h.includes('iflix.com')) return 'iFlix';
        return h.split('.')[0].charAt(0).toUpperCase() + h.split('.')[0].slice(1);
    } catch { return 'Video'; }
}

function generateThumbnail(url, noembedThumb) {
    const ytId = getYtId(url);
    if (ytId) return `https://img.youtube.com/vi/${ytId}/mqdefault.jpg`;
    if (noembedThumb) return noembedThumb;
    try {
        const domain = new URL(url).hostname.replace('www.', '');
        return `https://placehold.co/320x172/fdecea/c0392b?text=${encodeURIComponent(domain)}`;
    } catch { return `https://placehold.co/320x172/fdecea/c0392b?text=Video`; }
}
</script>

    databaseURL: "https://katalog-video-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "katalog-video",
    storageBucket: "katalog-video.firebasestorage.app",

    appId: "1:1035864136490:web:9abe5dbf41e80b11ad5c53"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Path Firebase khusus video Indonesia
const DB_VIDEOS   = 'videos_indonesia';
const DB_KATEGORI = 'kategori_indonesia';

let daftarKategori = [];
let dataVideo = {};
let halamanSaatIni = 1;
const itemPerHalaman = 12;
let filterAktif = [];

function toast(msg, type = 'info') {
    const icons = { success: '✅', error: '❌', info: 'ℹ️' };
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => { el.style.animation = 'fadeOut .3s ease forwards'; setTimeout(() => el.remove(), 300); }, 3000);
}

const kamusKategori = {
    "Berita & Politik":    ["berita", "news", "politik", "pemerintah", "presiden", "dpri", "kompas", "detik", "tempo", "cnni", "tvone"],
    "Edukasi":             ["edukasi", "belajar", "tutorial", "kuliah", "sekolah", "pelajaran", "materi", "ilmu", "penjelasan"],
    "Teknologi":           ["teknologi", "tech", "coding", "programming", "software", "hardware", "ai", "artificial", "gadget", "review hp"],
    "Bisnis & Keuangan":   ["bisnis", "keuangan", "investasi", "saham", "crypto", "finansial", "passive income", "wirausaha", "startup"],
    "Motivasi & Mindset":  ["motivasi", "mindset", "sukses", "inspirasi", "semangat", "produktif", "kebiasaan", "habit"],
    "Hiburan":             ["hiburan", "entertainment", "comedy", "lucu", "film", "sinetron", "ftv", "variety"],
    "Podcast":             ["podcast", "ngobrol", "diskusi", "wawancara", "interview", "obrolan"],
    "Sejarah & Budaya":    ["sejarah", "history", "budaya", "tradisi", "nusantara", "kebudayaan", "heritage"],
    "Vlog & Traveling":    ["vlog", "traveling", "wisata", "liburan", "jalan-jalan", "travel", "tour", "adventure"],
    "Kuliner":             ["kuliner", "masak", "resep", "makanan", "food", "minuman", "review makanan", "warung"],
    "Olahraga":            ["olahraga", "sport", "bola", "sepakbola", "badminton", "basket", "renang", "fitness", "gym"],
    "Gaming":              ["gaming", "game", "main game", "gameplay", "streamer", "esport", "mobile legend", "freefire"],
};

const kategoriDefault = [
    "Berita & Politik","Edukasi","Teknologi","Bisnis & Keuangan",
    "Motivasi & Mindset","Hiburan","Podcast","Sejarah & Budaya",
    "Vlog & Traveling","Kuliner","Olahraga","Gaming"
];

const tebakKategori = (judul) => {
    let hasil = [];
    const j = judul.toLowerCase();
    for (const [kat, kata] of Object.entries(kamusKategori)) {
        if (kata.some(k => j.includes(k))) hasil.push(kat);
    }
    return hasil.length > 0 ? hasil : ["Belum Dikategorikan"];
};

function muatDataDatabase() {
    onValue(ref(db, DB_KATEGORI), (snap) => {
        daftarKategori = snap.exists() ? snap.val() : [...kategoriDefault];
        if (!snap.exists()) set(ref(db, DB_KATEGORI), daftarKategori);
        updateUIKat();
        renderFilter();
    });
    onValue(ref(db, DB_VIDEOS), (snap) => {
        dataVideo = snap.val() || {};
        renderRak();
        document.getElementById('loading-overlay').style.display = 'none';
    });
}
muatDataDatabase();

const simpanKategoriKeDB = () => set(ref(db, DB_KATEGORI), daftarKategori);

window.tambahKategori = () => {
    const val = document.getElementById('inputKategoriBaru').value.trim();
    if (!val) return toast('Nama kategori tidak boleh kosong!', 'error');
    if (daftarKategori.includes(val)) return toast('Kategori sudah ada!', 'error');
    daftarKategori.push(val);
    document.getElementById('inputKategoriBaru').value = '';
    simpanKategoriKeDB();
    toast(`Kategori "${val}" ditambahkan!`, 'success');
};

window.hapusKategori = (index) => {
    if (!confirm('Yakin ingin menghapus kategori ini?')) return;
    const nama = daftarKategori[index];
    daftarKategori.splice(index, 1);
    simpanKategoriKeDB();
    toast(`Kategori "${nama}" dihapus.`, 'info');
};

window.updateUIKat = () => {
    const w = document.getElementById('wadahPilihKategori');
    const l = document.getElementById('listKategoriDikelola');
    w.innerHTML = ''; l.innerHTML = '';
    daftarKategori.forEach((k, i) => {
        w.innerHTML += `<label class="kat-label"><input type="checkbox" value="${k}" class="cek-kat"> ${k}</label>`;
        l.innerHTML += `<span class="tag-kelola">${k} <button class="hapus-kat" onclick="hapusKategori(${i})">×</button></span>`;
    });
};

window.renderFilter = () => {
    const kontainer = document.getElementById('filterKategori');
    kontainer.innerHTML = '';
    daftarKategori.forEach(k => {
        const aktif = filterAktif.includes(k) ? 'aktif' : '';
        kontainer.innerHTML += `<button class="filter-btn ${aktif}" onclick="toggleFilter('${k}')">${k}</button>`;
    });
    document.getElementById('filter-semua').classList.toggle('aktif', filterAktif.length === 0);
};

window.toggleFilter = (kat) => {
    const i = filterAktif.indexOf(kat);
    if (i > -1) filterAktif.splice(i, 1); else filterAktif.push(kat);
    halamanSaatIni = 1; renderFilter(); renderRak();
};

window.resetFilter = () => { filterAktif = []; halamanSaatIni = 1; renderFilter(); renderRak(); };

window.simpanVideo = async () => {
    const url = document.getElementById('linkVideo').value.trim();
    const durasiManual = document.getElementById('inputDurasi').value.trim() || '--:--';
    let kats = Array.from(document.querySelectorAll('.cek-kat:checked')).map(c => c.value);

    if (!url) return toast('Link video wajib diisi!', 'error');
    try { new URL(url); } catch { return toast('Link tidak valid! Pastikan dimulai dengan https://', 'error'); }

    if (Object.values(dataVideo).some(v => v.link === url)) {
        toast('Video ini sudah ada di katalog!', 'error');
        document.getElementById('linkVideo').value = '';
        return;
    }

    const tombol = document.getElementById('tombolSimpan');
    tombol.disabled = true; tombol.textContent = '⏳ Mengambil data...';

    try {
        let judul = 'Untitled Video', channel = 'Unknown', noembedThumb = null;
        try {
            const meta = await fetch(`https://noembed.com/embed?url=${encodeURIComponent(url)}`).then(r => r.json());
            if (meta.title) judul = meta.title;
            if (meta.author_name) channel = meta.author_name;
            if (meta.thumbnail_url) noembedThumb = meta.thumbnail_url;
        } catch (_) {}

        const platform = getPlatform(url);
        const thumbnail = generateThumbnail(url, noembedThumb);

        if (kats.length === 0) {
            kats = tebakKategori(judul);
            let adaBaru = false;
            kats.forEach(k => { if (!daftarKategori.includes(k) && k !== 'Belum Dikategorikan') { daftarKategori.push(k); adaBaru = true; } });
            if (adaBaru) simpanKategoriKeDB();
        }

        await push(ref(db, DB_VIDEOS), {
            judul, channel, link: url, platform, thumbnail,
            kategori: kats, durasi: durasiManual,
            lastWatch: '', selesai: false, catatan: '', waktuSimpan: Date.now()
        });

        document.getElementById('linkVideo').value = '';
        document.getElementById('inputDurasi').value = '';
        document.getElementById('inputDurasi').placeholder = 'Durasi (15:30)';
        document.querySelectorAll('.cek-kat').forEach(c => c.checked = false);
        toast(`"${judul}" berhasil disimpan!`, 'success');
    } catch (e) {
        toast('Gagal menyimpan. Cek koneksi atau link!', 'error');
    } finally {
        tombol.disabled = false; tombol.textContent = '💾 Simpan';
    }
};

window.renderRak = () => {
    const cari = document.getElementById('inputCari').value.toLowerCase();
    const sort = document.getElementById('sortPilihan').value;
    const rak = document.getElementById('rakVideo');
    let videos = Object.entries(dataVideo).map(([id, v]) => ({ id, ...v }));

    if (cari) videos = videos.filter(v =>
        v.judul?.toLowerCase().includes(cari) ||
        (v.kategori || []).some(k => k.toLowerCase().includes(cari)) ||
        (v.catatan || '').toLowerCase().includes(cari) ||
        (v.platform || '').toLowerCase().includes(cari)
    );
    if (filterAktif.length > 0) videos = videos.filter(v => (v.kategori || []).some(k => filterAktif.includes(k)));
    if (sort === 'belum')   videos = videos.filter(v => !v.selesai);
    if (sort === 'selesai') videos = videos.filter(v => v.selesai);
    if (sort === 'terbaru') videos.sort((a,b) => (b.waktuSimpan||0)-(a.waktuSimpan||0));
    else if (sort === 'terlama') videos.sort((a,b) => (a.waktuSimpan||0)-(b.waktuSimpan||0));
    else if (sort === 'az') videos.sort((a,b) => a.judul?.localeCompare(b.judul));
    else if (sort === 'za') videos.sort((a,b) => b.judul?.localeCompare(a.judul));

    const total = Math.ceil(videos.length / itemPerHalaman);
    if (halamanSaatIni > total && total > 0) halamanSaatIni = total;
    const start = (halamanSaatIni - 1) * itemPerHalaman;
    const ditampilkan = videos.slice(start, start + itemPerHalaman);

    if (ditampilkan.length === 0) {
        rak.innerHTML = `<div class="empty-state"><div class="icon">🇮🇩</div><p>Belum ada video Indonesia tersimpan</p><span>Paste link dari YouTube, TikTok, atau platform lain!</span></div>`;
    } else {
        rak.innerHTML = ditampilkan.map(v => {
            const tagHtml = (v.kategori||[]).map(k=>`<span class="tag-badge">${k}</span>`).join('');
            const statusBadge = v.selesai
                ? `<span class="status-badge status-selesai">✓ Selesai</span>`
                : v.lastWatch ? `<span class="status-badge status-proses">▶ Dalam proses</span>` : '';
            const platformBadge = v.platform && v.platform !== 'YouTube'
                ? `<span class="platform-badge">${v.platform}</span>` : '';
            const thumb = v.thumbnail || `https://placehold.co/320x172/fdecea/c0392b?text=Video`;
            const isYT = getYtId(v.link||'') !== null;
            return `
            <div class="kartu-video">
                <button class="btn-hapus-video" onclick="hapusVideo('${v.id}')" title="Hapus">✕</button>
                <div class="thumbnail-container" onclick="putarVideo('player-${v.id}','${v.link}',${isYT})">
                    <img id="player-${v.id}" src="${thumb}" class="thumbnail" loading="lazy"
                         onerror="this.src='https://placehold.co/320x172/fdecea/c0392b?text=No+Thumbnail'">
                    ${statusBadge}
                    <div class="thumbnail-overlay"><div class="play-btn">▶</div></div>
                    <span class="durasi-label">${v.durasi||'--:--'}</span>
                    ${platformBadge}
                </div>
                <div class="konten-kartu">
                    <div class="tags-row">${tagHtml}</div>
                    <p class="judul-video">${v.judul||'Tanpa Judul'}</p>
                    <div class="progress-wrap">
                        <label>⏱ Progress nonton</label>
                        <input type="text" id="last-${v.id}" value="${v.lastWatch||''}" placeholder="cth: 12:30">
                    </div>
                    <div class="area-catatan">
                        <label>📝 Catatan</label>
                        <textarea id="note-${v.id}" class="teks-catatan" placeholder="Tulis catatan penting...">${v.catatan||''}</textarea>
                    </div>
                    <div class="aksi-bawah">
                        <button class="btn-simpan" onclick="updateProgress('${v.id}',${v.selesai})">${v.selesai?'🔄 Reset':'💾 Simpan'}</button>
                        <a href="${v.link}" target="_blank" rel="noopener noreferrer" class="btn-tonton">📺 Tonton</a>
                    </div>
                    <label style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;margin-top:8px;cursor:pointer;color:var(--muted)">
                        <input type="checkbox" ${v.selesai?'checked':''} onchange="tandaiSelesai('${v.id}',this.checked)"> Tandai selesai ✓
                    </label>
                </div>
            </div>`;
        }).join('');
    }
    renderPaginasi(total);
};

window.updateProgress = (id) => {
    const lastWatch = document.getElementById(`last-${id}`)?.value||'';
    const catatan   = document.getElementById(`note-${id}`)?.value||'';
    update(ref(db,`${DB_VIDEOS}/${id}`),{lastWatch,catatan})
        .then(()=>toast('Progress disimpan!','success'))
        .catch(()=>toast('Gagal menyimpan!','error'));
};

window.tandaiSelesai = (id,val) => {
    update(ref(db,`${DB_VIDEOS}/${id}`),{selesai:val})
        .then(()=>toast(val?'Ditandai selesai ✓':'Ditandai belum selesai',val?'success':'info'));
};

window.hapusVideo = (id) => {
    if (!confirm('Hapus video ini dari katalog?')) return;
    remove(ref(db,`${DB_VIDEOS}/${id}`)).then(()=>toast('Video dihapus.','info'));
};

window.putarVideo = (containerId, url, isYT) => {
    if (isYT) {
        const ytId = getYtId(url);
        if (!ytId) return;
        const container = document.getElementById(containerId);
        if (!container) return;
        const parent = container.closest('.thumbnail-container');
        parent.onclick = null;
        parent.style.aspectRatio = '16/9';
        parent.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0&modestbranding=1&iv_load_policy=3&cc_load_policy=0" frameborder="0" allow="autoplay; encrypted-media; fullscreen" allowfullscreen style="display:block;border-radius:0;"></iframe>`;
    } else {
        window.open(url,'_blank','noopener,noreferrer');
    }
};

window.resetKeHalamanSatu = () => { halamanSaatIni = 1; renderRak(); };

window.gantiHalaman = (n) => { halamanSaatIni = n; renderRak(); window.scrollTo({top:0,behavior:'smooth'}); };

window.renderPaginasi = (total) => {
    const k = document.getElementById('paginasiKontainer');
    if (total <= 1) { k.innerHTML = ''; return; }
    let html = `<button class="page-btn" onclick="gantiHalaman(${halamanSaatIni-1})" ${halamanSaatIni===1?'disabled':''}>‹ Prev</button>`;
    const range = 2;
    for (let i=1; i<=total; i++) {
        if (i===1||i===total||(i>=halamanSaatIni-range&&i<=halamanSaatIni+range)) {
            html += `<button class="page-btn ${i===halamanSaatIni?'aktif':''}" onclick="gantiHalaman(${i})">${i}</button>`;
        } else if (i===halamanSaatIni-range-1||i===halamanSaatIni+range+1) {
            html += `<span style="align-self:center;color:var(--muted)">…</span>`;
        }
    }
    html += `<button class="page-btn" onclick="gantiHalaman(${halamanSaatIni+1})" ${halamanSaatIni===total?'disabled':''}>Next ›</button>`;
    k.innerHTML = html;
};
</script>

<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(()=>{}); });
}
const fab = document.getElementById('fabTop');
window.addEventListener('scroll', () => { if(fab) fab.style.opacity = window.scrollY>320?'1':'0'; }, {passive:true});
</script>
