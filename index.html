<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Katalog Video Fokus Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1877f2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --blue: #1877f2;
            --blue-dark: #0f5fd1;
            --blue-light: #e7f3ff;
            --red: #e53935;
            --yellow: #f59e0b;
            --green: #10b981;
            --bg: #f0f2f5;
            --surface: #ffffff;
            --border: #e0e3e8;
            --text: #050505;
            --muted: #65676b;
            --radius: 14px;
            --radius-sm: 8px;
            --shadow: 0 2px 12px rgba(0,0,0,0.07);
            --shadow-hover: 0 8px 24px rgba(0,0,0,0.12);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── TOPBAR ── */
        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 0 20px;
        }
        .topbar-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 54px;
            gap: 16px;
        }
        .logo { font-weight: 700; font-size: 16px; color: var(--blue); white-space: nowrap; }
        .nav-links { display: flex; gap: 6px; flex-wrap: wrap; }
        .nav-link {
            padding: 6px 14px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: opacity .2s;
        }
        .nav-link:hover { opacity: .8; }

        /* ── BOTTOM NAV (mobile only) ── */
        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--surface);
            border-top: 1px solid var(--border);
            z-index: 200;
            padding: 0 0 env(safe-area-inset-bottom);
        }
        .bottom-nav-inner {
            display: flex;
            justify-content: space-around;
            height: 56px;
        }
        .bnav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 10px;
            font-weight: 700;
            color: var(--muted);
            gap: 3px;
            transition: color .15s;
        }
        .bnav-item.active { color: var(--blue); }
        .bnav-item span:first-child { font-size: 20px; line-height: 1; }

        /* ── MAIN LAYOUT ── */
        .main { max-width: 1100px; margin: 0 auto; padding: 24px 20px 60px; }

        /* ── PANEL ── */
        .panel {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 22px 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }
        .panel-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; color: var(--text); }

        /* ── FORM ELEMENTS ── */
        input[type="text"], input[type="url"], textarea {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 14px;
            color: var(--text);
            background: #fafbfc;
            transition: border-color .2s, box-shadow .2s;
            outline: none;
        }
        input:focus, textarea:focus {
            border-color: var(--blue);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(24,119,242,0.1);
        }

        .flex-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }

        .btn {
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            border: none;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s, transform .1s, box-shadow .2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--blue); color: #fff; }
        .btn-primary:hover { background: var(--blue-dark); box-shadow: 0 4px 14px rgba(24,119,242,0.35); }
        .btn-secondary { background: #e4e6eb; color: var(--text); }
        .btn-secondary:hover { background: #d8dadf; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }

        /* ── KATEGORI CHIPS ── */
        .wadah-kategori {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 14px;
            border: 1.5px dashed var(--border);
            border-radius: var(--radius-sm);
            background: #fafbfc;
            margin-top: 14px;
        }
        .kat-label {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 20px;
            background: #f0f2f5;
            border: 1px solid var(--border);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s, border-color .15s;
            user-select: none;
        }
        .kat-label:has(input:checked) {
            background: var(--blue-light);
            border-color: var(--blue);
            color: var(--blue);
        }
        .kat-label input { display: none; }

        .tag-kelola {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            background: var(--blue-light);
            color: var(--blue);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .tag-kelola .hapus-kat {
            cursor: pointer;
            color: var(--red);
            font-weight: 700;
            font-size: 13px;
            line-height: 1;
            background: none;
            border: none;
            padding: 0;
        }

        /* ── SEARCH + FILTER BAR ── */
        .search-wrap { position: relative; margin-bottom: 14px; }
        .search-wrap input {
            padding-left: 42px;
            border-radius: 30px;
            font-size: 14px;
        }
        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 16px;
            pointer-events: none;
        }
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            align-items: center;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            padding-bottom: 4px;
        }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-btn {
            padding: 7px 14px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s, border-color .15s, color .15s;
            color: var(--muted);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .filter-btn:hover { border-color: var(--blue); color: var(--blue); }
        .filter-btn.aktif { background: var(--blue); color: #fff; border-color: var(--blue); }
        .filter-sort {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .filter-sort select {
            padding: 7px 10px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            background: var(--surface);
        }
            font-weight: 600;
            cursor: pointer;
            transition: background .15s, border-color .15s, color .15s;
            color: var(--muted);
        }
        .filter-btn:hover { border-color: var(--blue); color: var(--blue); }
        .filter-btn.aktif { background: var(--blue); color: #fff; border-color: var(--blue); }
        .filter-sort {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .filter-sort select {
            padding: 6px 10px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            background: var(--surface);
        }

        /* ── GRID ── */
        .rak-katalog {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }

        /* ── KARTU VIDEO ── */
        .kartu-video {
            background: var(--surface);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            position: relative;
            transition: transform .2s, box-shadow .2s;
        }
        .kartu-video:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }

        .thumbnail-container {
            position: relative;
            aspect-ratio: 16/9;
            background: #e0e3e8;
            cursor: pointer;
            overflow: hidden;
        }
        .thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform .3s;
        }
        .kartu-video:hover .thumbnail { transform: scale(1.03); }
        .thumbnail-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.28);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity .2s;
        }
        /* Always show play overlay on touch devices */
        @media (hover: none) {
            .thumbnail-overlay { opacity: 1; background: rgba(0,0,0,0.18); }
        }
        .thumbnail-container:hover .thumbnail-overlay { opacity: 1; }
        .play-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #fff;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }
        .durasi-label {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.82);
            color: #fff;
            padding: 2px 7px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: 600;
        }
        .status-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
        }
        .status-selesai { background: var(--green); color: #fff; }
        .status-proses  { background: var(--yellow); color: #fff; }

        .btn-hapus-video {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(229,57,53,0.85);
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: background .2s, transform .15s;
        }
        .btn-hapus-video:hover { background: var(--red); transform: scale(1.1); }

        .konten-kartu { padding: 14px 16px 16px; flex-grow: 1; display: flex; flex-direction: column; gap: 10px; }

        .tags-row { display: flex; flex-wrap: wrap; gap: 5px; }
        .tag-badge {
            background: var(--blue-light);
            color: var(--blue);
            padding: 3px 9px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
        }

        .judul-video { font-size: 13.5px; font-weight: 700; line-height: 1.4; color: var(--text); }

        .progress-wrap label { font-size: 11px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 4px; }
        .progress-wrap input { font-size: 12px; padding: 8px 10px; }

        .area-catatan {
            background: #fffbeb;
            border: 1px dashed #f59e0b;
            border-radius: var(--radius-sm);
            padding: 10px;
        }
        .area-catatan label { font-size: 11px; font-weight: 700; color: #92400e; display: block; margin-bottom: 4px; }
        .teks-catatan {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 12px;
            resize: vertical;
            min-height: 48px;
            outline: none;
            font-family: inherit;
            color: var(--text);
        }

        .aksi-bawah { display: flex; gap: 8px; margin-top: 2px; }
        .btn-simpan { flex: 1; background: var(--green); color: #fff; font-size: 12px; padding: 8px 10px; border-radius: var(--radius-sm); border: none; font-family: inherit; font-weight: 700; cursor: pointer; transition: background .2s; }
        .btn-simpan:hover { background: #059669; }
        .btn-tonton { flex: 1; background: #e4e6eb; color: var(--text); font-size: 12px; padding: 8px 10px; border-radius: var(--radius-sm); border: none; font-family: inherit; font-weight: 700; cursor: pointer; text-decoration: none; text-align: center; transition: background .2s; }
        .btn-tonton:hover { background: #d8dadf; }

        /* ── EMPTY STATE ── */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state p { font-size: 15px; font-weight: 600; }
        .empty-state span { font-size: 13px; }

        /* ── SKELETON LOADER ── */
        .skeleton {
            background: linear-gradient(90deg, #f0f2f5 25%, #e0e3e8 50%, #f0f2f5 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 8px;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        @keyframes spin { 0% { transform: translateY(-50%) rotate(0deg); } 100% { transform: translateY(-50%) rotate(360deg); } }
        .skeleton-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
        .skeleton-thumb { height: 172px; }
        .skeleton-body { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 10px; }
        .skeleton-line { height: 12px; }
        .skeleton-line.short { width: 60%; }

        /* ── PAGINASI ── */
        .paginasi { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; margin-bottom: 40px; }
        .page-btn {
            background: var(--surface);
            border: 1.5px solid var(--border);
            color: var(--text);
            padding: 7px 13px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            transition: background .15s, border-color .15s;
        }
        .page-btn:hover:not(:disabled) { border-color: var(--blue); color: var(--blue); }
        .page-btn.aktif { background: var(--blue); color: #fff; border-color: var(--blue); }
        .page-btn:disabled { opacity: .4; cursor: not-allowed; }

        /* ── TOAST ── */
        #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            background: #1c1c1e;
            color: #fff;
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 6px 24px rgba(0,0,0,0.25);
            animation: slideIn .3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 320px;
        }
        .toast.success { border-left: 4px solid var(--green); }
        .toast.error   { border-left: 4px solid var(--red); }
        .toast.info    { border-left: 4px solid var(--blue); }
        @keyframes slideIn { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateX(30px); } }

        /* ── LOADING OVERLAY ── */
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(240,242,245,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            gap: 12px;
            font-weight: 600;
            color: var(--blue);
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--blue-light);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* ── MOBILE RESPONSIVE ── */
        @media (max-width: 640px) {
            /* Hide desktop nav, show bottom nav */
            .nav-links { display: none; }
            .bottom-nav { display: block; }

            /* Adjust main padding for bottom nav */
            .main { padding: 16px 12px 80px; }
            .topbar { padding: 0 14px; }

            /* Compact panels */
            .panel { padding: 16px 14px; margin-bottom: 14px; }
            .panel-title { font-size: 14px; margin-bottom: 12px; }

            /* Form stacked vertically */
            .flex-row { flex-direction: column; gap: 8px; margin-top: 10px; }
            .flex-row input, .flex-row button { width: 100%; }
            #tombolSimpan { padding: 13px; font-size: 15px; }

            /* Link input full row */
            #linkVideo { font-size: 15px; padding: 13px 14px; }
            #inputDurasi { font-size: 15px; }

            /* Kategori chips compact */
            .wadah-kategori { padding: 10px; gap: 6px; }
            .kat-label { font-size: 13px; padding: 7px 12px; }

            /* Grid 1 column */
            .rak-katalog { grid-template-columns: 1fr; gap: 14px; }

            /* Search full width */
            .search-wrap input { font-size: 15px; padding: 13px 14px 13px 42px; }

            /* Kartu bigger touch targets */
            .konten-kartu { padding: 12px 14px 14px; gap: 9px; }
            .judul-video { font-size: 14px; }
            .btn-simpan, .btn-tonton {
                padding: 11px 8px;
                font-size: 13px;
            }
            .progress-wrap input { padding: 10px 12px; font-size: 14px; }
            .teks-catatan { font-size: 13px; }

            /* Bigger hapus button for touch */
            .btn-hapus-video { width: 34px; height: 34px; font-size: 14px; }

            /* Toast adjust for bottom nav */
            #toast-container { bottom: 68px; right: 12px; left: 12px; }
            .toast { max-width: 100%; }

            /* Pagination compact */
            .page-btn { padding: 9px 12px; font-size: 13px; }
        }

        /* ── TIME TRACKER WIDGET ── */
        .waktu-hari-ini {
            display: flex;
            align-items: center;
            gap: 7px;
            background: var(--blue-light);
            border: 1.5px solid #b3d4fc;
            border-radius: 20px;
            padding: 5px 13px;
            font-size: 12px;
            font-weight: 700;
            color: var(--blue);
            white-space: nowrap;
            cursor: default;
            user-select: none;
            flex-shrink: 0;
        }
        .waktu-hari-ini .dot-live {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--green);
            animation: blink-dot 1.4s ease-in-out infinite;
            flex-shrink: 0;
        }
        .waktu-hari-ini.paused .dot-live {
            background: var(--yellow);
            animation: none;
        }
        @keyframes blink-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        /* Tooltip on hover */
        .waktu-wrap { position: relative; flex-shrink: 0; }
        .waktu-tooltip {
            display: none;
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: #1c1c1e;
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            padding: 8px 12px;
            border-radius: 10px;
            white-space: nowrap;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            z-index: 300;
        }
        .waktu-tooltip::before {
            content: '';
            position: absolute;
            top: -5px; right: 16px;
            border-left: 5px solid transparent;
            border-right: 5px solid transparent;
            border-bottom: 5px solid #1c1c1e;
        }
        .waktu-wrap:hover .waktu-tooltip { display: block; }

        /* ── Streak bar ── */
        .waktu-streak {
            font-size: 10px;
            color: var(--muted);
            margin-top: 2px;
        }

        @media (max-width: 640px) {
            .waktu-hari-ini { font-size: 11px; padding: 4px 10px; }
            .waktu-tooltip { right: -8px; }
        }

        /* FAB scroll-to-top */
        .fab-top {
            display: none;
            position: fixed;
            bottom: 72px;
            right: 16px;
            width: 44px; height: 44px;
            border-radius: 50%;
            background: var(--blue);
            color: #fff;
            border: none;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(24,119,242,.4);
            z-index: 150;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity .25s;
        }
        @media (max-width: 640px) { .fab-top { display: flex; } }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <span>Memuat data...</span>
</div>

<div id="toast-container"></div>

<!-- FAB scroll to top -->
<button class="fab-top" id="fabTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<!-- Bottom Navigation (mobile) -->
<nav class="bottom-nav">

<script>
// ── DURASI OTOMATIS via YouTube IFrame API ─────────────
let _ytReady = false;
const _ytQueue = [];

window.onYouTubeIframeAPIReady = () => {
    _ytReady = true;
    _ytQueue.forEach(fn => fn());
    _ytQueue.length = 0;
};

function _ambilDurasi(ytId) {
    return new Promise((resolve) => {
        const run = () => {
            const wrap = document.createElement('div');
            wrap.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:2px;height:2px;opacity:0;pointer-events:none;';
            document.body.appendChild(wrap);

            let done = false;
            const settle = (val) => {
                if (done) return; done = true;
                try { p.destroy(); } catch(e) {}
                wrap.remove();
                resolve(val);
            };

            let p;
            try {
                p = new YT.Player(wrap, {
                    videoId: ytId,
                    playerVars: { autoplay: 0, mute: 1 },
                    events: {
                        onReady: (e) => {
                            const dur = e.target.getDuration();
                            if (dur && isFinite(dur) && dur > 0) {
                                const h = Math.floor(dur / 3600);
                                const m = Math.floor((dur % 3600) / 60);
                                const s = Math.floor(dur % 60);
                                const str = h > 0
                                    ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
                                    : `${m}:${String(s).padStart(2,'0')}`;
                                settle(str);
                            } else {
                                settle(null); // live stream → durasi tak terhingga
                            }
                        },
                        onError: () => settle(null)
                    }
                });
            } catch(e) { settle(null); }

            setTimeout(() => settle(null), 12000); // timeout 12 detik
        };

        if (_ytReady) run();
        else _ytQueue.push(run);
    });
}

window.deteksiDurasiOtomatis = async () => {
    const url = document.getElementById('linkVideo').value.trim();
    if (!url) return;

    const match = url.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/|live\/)|youtu\.be\/)([^#&?]+)/);
    if (!match) return;

    const inputDurasi = document.getElementById('inputDurasi');
    const spinner = document.getElementById('durasi-spinner');

    // Tampilkan spinner, kosongkan input
    inputDurasi.value = '';
    inputDurasi.placeholder = 'Mendeteksi...';
    spinner.style.display = 'block';

    const durasi = await _ambilDurasi(match[1]);

    spinner.style.display = 'none';
    if (durasi) {
        inputDurasi.value = durasi;
        inputDurasi.placeholder = 'Durasi (15:30)';
    } else {
        inputDurasi.placeholder = 'Live / tidak terdeteksi';
    }
};
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, update, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBCHrlq5VIizVn42KzyvmUYH3OUs2G74rQ",
    authDomain: "katalog-video.firebaseapp.com",
    databaseURL: "https://katalog-video-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "katalog-video",
    storageBucket: "katalog-video.firebasestorage.app",
    messagingSenderId: "1035864136490",
    appId: "1:1035864136490:web:9abe5dbf41e80b11ad5c53"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let daftarKategori = [];
let dataVideo = {};
let halamanSaatIni = 1;
const itemPerHalaman = 12;
let filterAktif = [];

// ── TOAST ──────────────────────────────────────────
function toast(msg, type = 'info') {
    const icons = { success: '✅', error: '❌', info: 'ℹ️' };
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => {
        el.style.animation = 'fadeOut .3s ease forwards';
        setTimeout(() => el.remove(), 300);
    }, 3000);
}

// ── KAMUS KATEGORI ─────────────────────────────────
const kamusKategori = {
    "Materi Skripsi": ["skripsi", "kualitatif", "perpustakaan", "penelitian", "inlis", "inlislite", "jurnal", "metode"],
    "Belajar Coding": ["coding", "html", "css", "javascript", "js", "tutorial", "firebase", "web", "app"],
    "Nonton Idol": ["sakurazaka", "sakurazaka46", "nogizaka46", "idol", "jpop", "morita", "ozono", "ishimori", "shiraishi"],
    "Belajar Bahasa": ["jlpt", "n3", "n4", "jepang", "kanji", "grammar", "english", "listening", "vocab"],
    "Sejarah & Edukasi": ["ww2", "wwii", "nazi", "history", "sejarah", "documentary", "dokumenter"],
    "Fitness & Habit": ["workout", "hiit", "lari", "running", "deep work", "cal newport", "produktivitas", "fokus"]
};

const tebakKategori = (judul) => {
    let hasil = [];
    const j = judul.toLowerCase();
    for (const [kat, kata] of Object.entries(kamusKategori)) {
        if (kata.some(k => j.includes(k))) hasil.push(kat);
    }
    return hasil.length > 0 ? hasil : ["Belum Dikategorikan"];
};

// ── DATABASE ───────────────────────────────────────
function muatDataDatabase() {
    onValue(ref(db, 'kategori'), (snap) => {
        daftarKategori = snap.exists() ? snap.val() : ["Materi Skripsi", "Belajar Coding", "Nonton Idol", "Belajar Bahasa"];
        if (!snap.exists()) set(ref(db, 'kategori'), daftarKategori);
        updateUIKat();
        renderFilter();
    });

    onValue(ref(db, 'videos'), (snap) => {
        dataVideo = snap.val() || {};
        renderRak();
        document.getElementById('loading-overlay').style.display = 'none';
    });
}

muatDataDatabase();

const simpanKategoriKeDB = () => set(ref(db, 'kategori'), daftarKategori);

// ── KATEGORI ───────────────────────────────────────
window.tambahKategori = () => {
    const val = document.getElementById('inputKategoriBaru').value.trim();
    if (!val) return toast('Nama kategori tidak boleh kosong!', 'error');
    if (daftarKategori.includes(val)) return toast('Kategori sudah ada!', 'error');
    daftarKategori.push(val);
    document.getElementById('inputKategoriBaru').value = '';
    simpanKategoriKeDB();
    toast(`Kategori "${val}" ditambahkan!`, 'success');
};

window.hapusKategori = (index) => {
    if (!confirm('Yakin ingin menghapus kategori ini?')) return;
    const nama = daftarKategori[index];
    daftarKategori.splice(index, 1);
    simpanKategoriKeDB();
    toast(`Kategori "${nama}" dihapus.`, 'info');
};

window.updateUIKat = () => {
    const w = document.getElementById('wadahPilihKategori');
    const l = document.getElementById('listKategoriDikelola');
    w.innerHTML = '';
    l.innerHTML = '';
    daftarKategori.forEach((k, i) => {
        w.innerHTML += `<label class="kat-label"><input type="checkbox" value="${k}" class="cek-kat"> ${k}</label>`;
        l.innerHTML += `<span class="tag-kelola">${k} <button class="hapus-kat" onclick="hapusKategori(${i})">×</button></span>`;
    });
};

// ── FILTER ────────────────────────────────────────
window.renderFilter = () => {
    const kontainer = document.getElementById('filterKategori');
    kontainer.innerHTML = '';
    daftarKategori.forEach(k => {
        const aktif = filterAktif.includes(k) ? 'aktif' : '';
        kontainer.innerHTML += `<button class="filter-btn ${aktif}" onclick="toggleFilter('${k}')">${k}</button>`;
    });
    document.getElementById('filter-semua').classList.toggle('aktif', filterAktif.length === 0);
};

window.toggleFilter = (kat) => {
    const i = filterAktif.indexOf(kat);
    if (i > -1) filterAktif.splice(i, 1);
    else filterAktif.push(kat);
    halamanSaatIni = 1;
    renderFilter();
    renderRak();
};

window.resetFilter = () => {
    filterAktif = [];
    halamanSaatIni = 1;
    renderFilter();
    renderRak();
};

// ── SIMPAN VIDEO ──────────────────────────────────
window.simpanVideo = async () => {
    const url = document.getElementById('linkVideo').value.trim();
    const durasiManual = document.getElementById('inputDurasi').value.trim() || '--:--';
    let kats = Array.from(document.querySelectorAll('.cek-kat:checked')).map(c => c.value);

    if (!url) return toast('Link YouTube wajib diisi!', 'error');

    // Validasi URL YouTube (termasuk Shorts, Live & youtu.be)
    const validYT = /(?:youtube\.com\/(?:watch\?v=|shorts\/|live\/)|youtu\.be\/)([^#&?]+)/;
    const idMatch = url.match(validYT);
    if (!idMatch) return toast('Link tidak valid! Hanya YouTube yang didukung.', 'error');
    const ytId = idMatch[1];

    // Cek duplikat
    if (Object.values(dataVideo).some(v => v.link === url)) {
        toast('Video ini sudah ada di rak!', 'error');
        document.getElementById('linkVideo').value = '';
        return;
    }

    const tombol = document.getElementById('tombolSimpan');
    tombol.disabled = true;
    tombol.textContent = '⏳ Mengambil data...';

    try {
        let judul = 'Live Stream';
        let channel = 'Unknown';
        try {
            const meta = await fetch(`https://noembed.com/embed?url=${encodeURIComponent(url)}`).then(r => r.json());
            judul = meta.title || 'Live Stream';
            channel = meta.author_name || 'Unknown';
        } catch (_) { /* noembed gagal untuk live stream aktif, pakai nilai default */ }

        if (kats.length === 0) {
            kats = tebakKategori(judul);
            let adaBaru = false;
            kats.forEach(k => {
                if (!daftarKategori.includes(k) && k !== 'Belum Dikategorikan') {
                    daftarKategori.push(k);
                    adaBaru = true;
                }
            });
            if (adaBaru) simpanKategoriKeDB();
        }

        await push(ref(db, 'videos'), {
            judul,
            channel,
            link: url,
            thumbnail: `https://img.youtube.com/vi/${ytId}/mqdefault.jpg`,
            kategori: kats,
            durasi: durasiManual,
            lastWatch: '',
            selesai: false,
            catatan: '',
            waktuSimpan: Date.now()
        });

        document.getElementById('linkVideo').value = '';
        document.getElementById('inputDurasi').value = '';
        document.querySelectorAll('.cek-kat').forEach(c => c.checked = false);
        toast(`"${judul}" berhasil disimpan!`, 'success');
    } catch (e) {
        toast('Gagal menyimpan. Cek koneksi atau link!', 'error');
    } finally {
        tombol.disabled = false;
        tombol.textContent = '💾 Simpan';
    }
};

// ── RENDER RAK ────────────────────────────────────
window.renderRak = () => {
    const cari = document.getElementById('inputCari').value.toLowerCase();
    const sort = document.getElementById('sortPilihan').value;
    const rak = document.getElementById('rakVideo');

    let videos = Object.entries(dataVideo).map(([id, v]) => ({ id, ...v }));

    // Filter pencarian
    if (cari) {
        videos = videos.filter(v =>
            v.judul?.toLowerCase().includes(cari) ||
            (v.kategori || []).some(k => k.toLowerCase().includes(cari)) ||
            (v.catatan || '').toLowerCase().includes(cari)
        );
    }

    // Filter kategori
    if (filterAktif.length > 0) {
        videos = videos.filter(v => (v.kategori || []).some(k => filterAktif.includes(k)));
    }

    // Filter status (sorting by selesai)
    if (sort === 'belum') videos = videos.filter(v => !v.selesai);
    if (sort === 'selesai') videos = videos.filter(v => v.selesai);

    // Sort
    if (sort === 'terbaru') videos.sort((a, b) => (b.waktuSimpan || 0) - (a.waktuSimpan || 0));
    else if (sort === 'terlama') videos.sort((a, b) => (a.waktuSimpan || 0) - (b.waktuSimpan || 0));
    else if (sort === 'az') videos.sort((a, b) => a.judul?.localeCompare(b.judul));
    else if (sort === 'za') videos.sort((a, b) => b.judul?.localeCompare(a.judul));

    const total = Math.ceil(videos.length / itemPerHalaman);
    if (halamanSaatIni > total && total > 0) halamanSaatIni = total;

    const start = (halamanSaatIni - 1) * itemPerHalaman;
    const ditampilkan = videos.slice(start, start + itemPerHalaman);

    // Build HTML string (satu kali set, tidak di dalam loop)
    if (ditampilkan.length === 0) {
        rak.innerHTML = `
            <div class="empty-state">
                <div class="icon">🎬</div>
                <p>Tidak ada video ditemukan</p>
                <span>Coba ubah filter atau kata pencarian</span>
            </div>`;
    } else {
        const html = ditampilkan.map(v => {
            const tagHtml = (v.kategori || []).map(k => `<span class="tag-badge">${k}</span>`).join('');
            const statusBadge = v.selesai
                ? `<span class="status-badge status-selesai">✓ Selesai</span>`
                : v.lastWatch
                ? `<span class="status-badge status-proses">▶ Dalam proses</span>`
                : '';
            const fallbackThumb = `https://img.youtube.com/vi/${v.link?.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/|live\/)|youtu\.be\/)([^#&?]+)/)?.[1]}/mqdefault.jpg`;
            return `
            <div class="kartu-video">
                <button class="btn-hapus-video" onclick="hapusVideo('${v.id}')" title="Hapus">✕</button>
                <div class="thumbnail-container" onclick="putarVideo('player-${v.id}', '${v.link}')">
                    <img id="player-${v.id}" src="${v.thumbnail || fallbackThumb}" class="thumbnail" loading="lazy"
                         onerror="this.src='https://placehold.co/320x172/e0e3e8/999?text=No+Thumbnail'">
                    ${statusBadge}
                    <div class="thumbnail-overlay"><div class="play-btn">▶</div></div>
                    <span class="durasi-label">${v.durasi || '--:--'}</span>
                </div>
                <div class="konten-kartu">
                    <div class="tags-row">${tagHtml}</div>
                    <p class="judul-video">${v.judul || 'Tanpa Judul'}</p>
                    <div class="progress-wrap">
                        <label>⏱ Progress nonton</label>
                        <input type="text" id="last-${v.id}" value="${v.lastWatch || ''}" placeholder="cth: 12:30">
                    </div>
                    <div class="area-catatan">
                        <label>📝 Catatan</label>
                        <textarea id="note-${v.id}" class="teks-catatan" placeholder="Tulis catatan...">${v.catatan || ''}</textarea>
                    </div>
                    <div class="aksi-bawah">
                        <button class="btn-simpan" onclick="updateProgress('${v.id}', ${v.selesai})">
                            ${v.selesai ? '🔄 Reset' : '💾 Simpan'}
                        </button>
                        <a href="${v.link}" target="_blank" rel="noopener noreferrer" class="btn-tonton">📺 Tonton</a>
                    </div>
                    <label style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;margin-top:8px;cursor:pointer;color:var(--muted)">
                        <input type="checkbox" ${v.selesai ? 'checked' : ''} onchange="tandaiSelesai('${v.id}', this.checked)"> Tandai selesai
                    </label>
                </div>
            </div>`;
        }).join('');
        rak.innerHTML = html;
    }

    renderPaginasi(total);
};

// ── ACTIONS ───────────────────────────────────────
window.updateProgress = (id, selesaiSkrg) => {
    const lastWatch = document.getElementById(`last-${id}`)?.value || '';
    const catatan   = document.getElementById(`note-${id}`)?.value || '';
    update(ref(db, `videos/${id}`), { lastWatch, catatan })
        .then(() => toast('Progress disimpan!', 'success'))
        .catch(() => toast('Gagal menyimpan!', 'error'));
};

window.tandaiSelesai = (id, val) => {
    update(ref(db, `videos/${id}`), { selesai: val })
        .then(() => toast(val ? 'Ditandai selesai ✓' : 'Ditandai belum selesai', val ? 'success' : 'info'));
};

window.hapusVideo = (id) => {
    if (!confirm('Hapus video ini dari rak?')) return;
    remove(ref(db, `videos/${id}`))
        .then(() => toast('Video dihapus.', 'info'));
};

window.putarVideo = (containerId, url) => {
    const match = url.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/|live\/)|youtu\.be\/)([^#&?]+)/);
    const ytId = match ? match[1] : null;
    if (!ytId) return;
    const container = document.getElementById(containerId);
    if (!container) return;
    // Replace img tag only (keep overlay etc. intact by replacing whole container content)
    const parent = container.closest('.thumbnail-container');
    parent.onclick = null;
    parent.style.aspectRatio = '16/9';
    parent.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0&modestbranding=1&iv_load_policy=3&cc_load_policy=0" frameborder="0" allow="autoplay; encrypted-media; fullscreen" allowfullscreen style="display:block;border-radius:0;"></iframe>`;
};

window.resetKeHalamanSatu = () => { halamanSaatIni = 1; renderRak(); };

// ── PAGINASI ──────────────────────────────────────
window.gantiHalaman = (n) => {
    halamanSaatIni = n;
    renderRak();
    window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.renderPaginasi = (total) => {
    const k = document.getElementById('paginasiKontainer');
    if (total <= 1) { k.innerHTML = ''; return; }

    let html = `<button class="page-btn" onclick="gantiHalaman(${halamanSaatIni - 1})" ${halamanSaatIni === 1 ? 'disabled' : ''}>‹ Prev</button>`;

    const range = 2;
    for (let i = 1; i <= total; i++) {
        if (i === 1 || i === total || (i >= halamanSaatIni - range && i <= halamanSaatIni + range)) {
            html += `<button class="page-btn ${i === halamanSaatIni ? 'aktif' : ''}" onclick="gantiHalaman(${i})">${i}</button>`;
        } else if (i === halamanSaatIni - range - 1 || i === halamanSaatIni + range + 1) {
            html += `<span style="align-self:center;color:var(--muted)">…</span>`;
        }
    }

    html += `<button class="page-btn" onclick="gantiHalaman(${halamanSaatIni + 1})" ${halamanSaatIni === total ? 'disabled' : ''}>Next ›</button>`;
    k.innerHTML = html;
};
</script>

    const todayKey = () => {
        const d = new Date();
        return `${PAGE_KEY}_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    };

    // Ambil detik tersimpan hari ini
    const getStored = () => parseInt(localStorage.getItem(todayKey()) || '0', 10);
    const saveStored = (s) => localStorage.setItem(todayKey(), String(s));

    let totalDetik = getStored();
    let startTime = null;
    let intervalId = null;
    let isActive = false;

    const fmt = (s) => {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        if (h > 0) return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
        return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    };

    const fmtVerbose = (s) => {
        if (s < 60) return `${s} detik`;
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        let str = '';
        if (h > 0) str += `${h} jam `;
        if (m > 0) str += `${m} menit `;
        if (sec > 0 && h === 0) str += `${sec} detik`;
        return str.trim();
    };

    const updateUI = () => {
        const el = document.getElementById('waktuTeks');
        const widget = document.getElementById('waktuWidget');
        const detail = document.getElementById('waktuTooltipDetail');
        if (!el) return;

        el.textContent = fmt(totalDetik);

        // Verbose di tooltip
        if (detail) {
            const tgl = new Date();
            const tglStr = tgl.toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long' });
            detail.textContent = `${fmtVerbose(totalDetik)} — ${tglStr}`;
        }

        // Warna berubah sesuai durasi
        if (widget) {
            if (totalDetik >= 7200) {          // ≥ 2 jam → oranye
                widget.style.background = '#fff7ed';
                widget.style.borderColor = '#fed7aa';
                widget.style.color = '#c2410c';
            } else if (totalDetik >= 3600) {   // ≥ 1 jam → hijau muda
                widget.style.background = '#ecfdf5';
                widget.style.borderColor = '#a7f3d0';
                widget.style.color = '#065f46';
            } else {
                widget.style.background = '';
                widget.style.borderColor = '';
                widget.style.color = '';
            }
        }
    };

    const mulai = () => {
        if (isActive) return;
        isActive = true;
        startTime = Date.now();
        const widget = document.getElementById('waktuWidget');
        if (widget) widget.classList.remove('paused');

        intervalId = setInterval(() => {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            totalDetik = getStored() + elapsed;
            updateUI();
        }, 1000);
    };

    const jeda = () => {
        if (!isActive) return;
        isActive = false;
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        totalDetik = getStored() + elapsed;
        saveStored(totalDetik);
        clearInterval(intervalId);
        startTime = null;

        const widget = document.getElementById('waktuWidget');
        if (widget) widget.classList.add('paused');
        updateUI();
    };

    // Page Visibility API — jeda saat tab tidak aktif
    document.addEventListener('visibilitychange', () => {
        if (document.hidden) jeda();
        else mulai();
    });

    // Simpan saat user menutup / navigasi
    window.addEventListener('beforeunload', jeda);
    window.addEventListener('pagehide', jeda);

    // Reset otomatis hari baru (cek tiap menit)
    setInterval(() => {
        const stored = getStored();
        // Jika key berbeda (hari berganti), totalDetik akan dari 0
        if (stored === 0 && totalDetik > 60) {
            totalDetik = 0;
            updateUI();
        }
    }, 60000);

    // Init
    updateUI();
    mulai();
})();
</script>
</body>
</html>
